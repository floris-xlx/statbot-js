        - $ref: "#/components/parameters/WhitelistActivities"
        - $ref: "#/components/parameters/BlacklistActivities"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/ByActivity"
        - $ref: "#/components/parameters/ByMember"
      responses:
        "200":
          description: A timeseries of activity counts. Use the `by_*` query parameters to
            group data.
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/XRateLimitLimit"
            x-ratelimit-remaining:
