openapi: 3.1.0
info:
  title: Statbot API
  version: 1.0.0
  description: Generated from the code-backed route definitions under
    `scripts/openapi`. This document models the current public GET endpoints
    captured on June 17, 2026.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.statbot.net
    description: Production
tags:
  - name: Activities
    description: Guild activity and global activity endpoints.
  - name: Messages
    description: Guild message stats endpoints.
  - name: Voice
    description: Guild voice stats endpoints.
  - name: Guild Counts
    description: Guild member, participant, and presence count endpoints.
  - name: Invites
    description: Guild invite analytics and invite resource endpoints.
  - name: Channels
    description: Guild channel resource endpoints.
security:
  - BearerAuth: []
paths:
  /v1/activities:
    get:
      summary: Get activities
      description: Get the list of activities that Statbot is currently tracking
        across all guilds.
      security:
        - BearerAuth: []
      operationId: getActivities
      tags:
        - Activities
      responses:
        "200":
          description: A list of activities.
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/XRateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/XRateLimitReset"
            retry-after:
              $ref: "#/components/headers/RetryAfter"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/guilds/{guild_id}/activities/series:
    get:
      summary: Get activity series
      description: Get activity series data for a guild.
      security:
        - BearerAuth: []
      operationId: getActivitySeries
      tags:
        - Activities
      parameters:
        - $ref: "#/components/parameters/GuildId"
        - $ref: "#/components/parameters/Start"
