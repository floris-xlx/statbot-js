components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Statbot API bearer token.
  headers:
    XRateLimitLimit:
      description: Maximum number of requests that can be made in the current time window.
      schema:
        type: integer
        description: Maximum number of requests in the time window.
        example: 10
    XRateLimitRemaining:
      description: Number of requests remaining in the current time window.
      schema:
        type: integer
        description: Remaining requests in the time window.
        example: 5
    XRateLimitReset:
      description: How many seconds until the rate limit resets.
      schema:
        type: integer
        description: Seconds until the rate limit resets.
        example: 60
    RetryAfter:
      description: If max requests are reached, the time in seconds to wait before
        making a new request.
      schema:
        type: integer
        description: Seconds to wait before retrying.
        example: 30
  parameters:
    GuildId:
      name: guild_id
      in: path
      required: true
      description: Discord guild ID.
      schema:
        $ref: "#/components/schemas/Snowflake"
    ChannelId:
      name: channel_id
      in: path
      required: true
      description: Discord channel ID.
      schema:
        $ref: "#/components/schemas/Snowflake"
    InviteId:
      name: invite_id
      in: path
      required: true
      description: Statbot ID of the invite.
      schema:
        type: integer
        minimum: 1
    Start:
      name: start
      in: query
      description: Minimum timestamp in milliseconds since epoch.
      schema:
        type: integer
        minimum: 0
    TimezoneOffset:
      name: timezone_offset
      in: query
      description: Timezone offset in hours. For example, `-3` for UTC-3.
      schema:
        type: number
        minimum: -12
        maximum: 14
    Interval:
      name: interval
      in: query
      description: Time interval for the query. Defaults to `day`.
      schema:
        $ref: "#/components/schemas/Interval"
    End:
      name: end
      in: query
      description: Maximum timestamp in milliseconds since epoch. If not provided, the
        current time is used.
      schema:
        type: integer
        minimum: 0
    Bot:
      name: bot
      in: query
      description: If `true`, only include bot users. If `false`, only include non-bot
        users.
      schema:
        type: boolean
    WhitelistMembers:
      name: whitelist_members[]
      in: query
      description: List of member Discord IDs to whitelist. Cannot be used with
        `blacklist_members[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    BlacklistMembers:
      name: blacklist_members[]
      in: query
      description: List of member Discord IDs to blacklist. Cannot be used with
        `whitelist_members[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    WhitelistRoles:
      name: whitelist_roles[]
      in: query
      description: List of role Discord IDs to whitelist.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    BlacklistRoles:
      name: blacklist_roles[]
      in: query
      description: List of role Discord IDs to blacklist.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    WhitelistChannels:
      name: whitelist_channels[]
      in: query
      description: List of channel Discord IDs to whitelist. Cannot be used with
        `blacklist_channels[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    BlacklistChannels:
      name: blacklist_channels[]
      in: query
      description: List of channel Discord IDs to blacklist. Cannot be used with
        `whitelist_channels[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    WhitelistVoiceChannels:
      name: whitelist_voice_channels[]
      in: query
      description: List of voice channel Discord IDs to whitelist. Cannot be used with
        `blacklist_voice_channels[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    BlacklistVoiceChannels:
      name: blacklist_voice_channels[]
      in: query
      description: List of voice channel Discord IDs to blacklist. Cannot be used with
        `whitelist_voice_channels[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    VoiceStates:
      name: voice_states[]
      in: query
      description: List of voice states to include in the results.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/VoiceState"
    Limit:
      name: limit
      in: query
      description: Maximum number of results to return. Cannot be used with
        `page_size`, `page`, or `select[]`.
      schema:
        type: integer
        minimum: 1
    Order:
      name: order
      in: query
      description: Order of the results. Sorts by `timestamp` for series data and by
        `rank` for top data.
      schema:
        $ref: "#/components/schemas/SortOrder"
    PageSize:
      name: page_size
      in: query
      description: Number of results per page. Requires `page` and cannot be used with
        `limit` or `select[]`.
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      description: Page number for pagination. Requires `page_size` and cannot be used
        with `limit` or `select[]`.
      schema:
        type: integer
        minimum: 1
    Select:
      name: select[]
      in: query
      description: IDs to select in the top query. Cannot be used with `limit`,
        `page_size`, or `page`.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
    Full:
      name: full
      in: query
      description: If `true`, include the full optional fields in the response.
      schema:
        type: boolean
    ByChannel:
      name: by_channel
      in: query
      description: If `true`, group counts by channel with the `channelId` field in
        the response.
      schema:
        type: boolean
    ByMember:
      name: by_member
      in: query
      description: If `true`, group counts by member with the `memberId` field in the
        response.
      schema:
        type: boolean
    ByFlag:
      name: by_flag
      in: query
      description: If `true`, group counts by flags with the `flags` field in the response.
      schema:
        type: boolean
    ByState:
      name: by_state
      in: query
      description: If `true`, group voice activity by state with the `type` field in
        the response.
      schema:
        type: boolean
    ByActivity:
      name: by_activity
      in: query
      description: If `true`, group activity counts by activity with the `activityId`
        field in the response.
      schema:
        type: boolean
    WhitelistActivities:
      name: whitelist_activities[]
      in: query
      description: List of activity IDs to whitelist. Cannot be used with
        `blacklist_activities[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          minimum: 1
    BlacklistActivities:
      name: blacklist_activities[]
      in: query
      description: List of activity IDs to blacklist. Cannot be used with
        `whitelist_activities[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          minimum: 1
    WhitelistInvites:
      name: whitelist_invites[]
      in: query
      description: List of invite IDs to whitelist. Cannot be used with
        `blacklist_invites[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          minimum: 1
    BlacklistInvites:
      name: blacklist_invites[]
      in: query
      description: List of invite IDs to blacklist. Cannot be used with
        `whitelist_invites[]`.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          minimum: 1
    WhitelistInviteFlagsMask:
      name: whitelist_invite_flags_mask
      in: query
      description: Bitwise OR of invite flags to whitelist. Requires
        `whitelist_invite_flags_type`.
      schema:
        type: integer
    WhitelistInviteFlagsType:
      name: whitelist_invite_flags_type
      in: query
      description: Type of invite flag filtering to apply for the whitelist.
      schema:
        $ref: "#/components/schemas/InviteFlagFilterType"
    BlacklistInviteFlagsMask:
      name: blacklist_invite_flags_mask
      in: query
      description: Bitwise OR of invite flags to blacklist. Requires
        `blacklist_invite_flags_type`.
      schema:
        type: integer
    BlacklistInviteFlagsType:
      name: blacklist_invite_flags_type
      in: query
      description: Type of invite flag filtering to apply for the blacklist.
      schema:
        $ref: "#/components/schemas/InviteFlagFilterType"
    ByInvite:
      name: by_invite
      in: query
      description: If `true`, group counts by invite with the `inviteId` field in the
        response.
      schema:
        type: boolean
    ByInviter:
      name: by_inviter
      in: query
      description: If `true`, group counts by inviter with the `inviterId` field in
        the response.
      schema:
        type: boolean
    ByInvitee:
      name: by_invitee
      in: query
      description: If `true`, group counts by invitee with the `inviteeId` field in
        the response.
      schema:
        type: boolean
    Stats:
      name: stats[]
      in: query
      description: Stat types to include in the results. Source docs describe this as
        required, but also state all stat types are used when omitted.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/UniqueCountStat"
      required: false
    Types:
      name: types[]
      in: query
      description: Channel types to include in the response.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          enum:
            - 0
            - 2
            - 4
            - 5
            - 13
            - 15
            - 999
    Ids:
      name: ids[]
      in: query
      description: Specific Discord channel IDs to include in the response.
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Snowflake"
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UnauthorizedError"
  schemas:
    Snowflake:
      type: string
      pattern: ^[0-9]+$
      description: Discord snowflake ID.
      examples:
        - "123456789012345678"
    Interval:
      type: string
      enum:
        - hour
        - day
        - week
        - month
    SortOrder:
      type: string
      enum:
        - asc
        - desc
    VoiceState:
      type: string
      enum:
        - normal
        - afk
        - self_mute
        - self_deaf
        - server_mute
        - server_deaf
    InviteFlagFilterType:
      type: string
      enum:
        - any
        - all
    UniqueCountStat:
      type: string
      enum:
        - text
        - voice
    UnauthorizedError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
